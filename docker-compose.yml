services:
  postgres:
    image: postgres:16-alpine
    container_name: csv-postgres
    environment:
      POSTGRES_DB: csv_processor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d csv_processor"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csv-network

  redis:
    image: redis:7-alpine
    container_name: csv-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - csv-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: csv-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - csv-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: csv-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: csv-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://csv-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - csv-network

  api:
    build: ./api-service
    container_name: csv-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@csv-postgres:5432/csv_processor
      DB_POOL_SIZE: 10
      REDIS_HOST: csv-redis
      REDIS_PORT: 6379
      CACHE_TTL: 3600
      KAFKA_BROKERS: csv-kafka:29092
      KAFKA_TOPIC: records.uploaded
      KAFKA_CLIENT_ID_API: csv-api-producer
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - csv-network

  consumer:
    build: ./consumer-service
    container_name: csv-consumer
    environment:
      DATABASE_URL: postgresql://postgres:postgres@csv-postgres:5432/csv_processor
      DB_POOL_SIZE: 5
      REDIS_HOST: csv-redis
      REDIS_PORT: 6379
      CACHE_TTL: 3600
      KAFKA_BROKERS: csv-kafka:29092
      KAFKA_TOPIC: records.uploaded
      KAFKA_GROUP_ID: csv-consumer-group
      KAFKA_CLIENT_ID_CONSUMER: csv-consumer
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - csv-network

volumes:
  postgres_data:
  redis_data:

networks:
  csv-network:
    driver: bridge